name: Catchlog
options:
  bundleIdPrefix: com.shimondeitel.catchlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Catchlog:
    type: application
    platform: iOS
    sources:
      - path: Catchlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.catchlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Catchlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CatchlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CatchlogTests
      - path: Catchlog.storekit
    dependencies:
      - target: Catchlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.catchlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CatchlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CatchlogUITests
    dependencies:
      - target: Catchlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.catchlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Catchlog:
    build:
      targets:
        Catchlog: all
        CatchlogTests: [test]
        CatchlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Catchlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Catchlog.storekit
      targets:
        - CatchlogTests
        - CatchlogUITests
    archive:
      config: Release

<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catchlog</title>
<style>
body{margin:0;background:#12100e;color:#f2ede4;font-family:-apple-system,Helvetica,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center}
.wrap{max-width:560px;padding:40px}
h1{font-size:2.4rem;color:#0E4C63;margin-bottom:8px}
p{font-size:1.1rem;color:#cfc9bd;line-height:1.5}
.badge{display:inline-block;margin-top:24px;padding:10px 22px;border:1px solid #0E4C63;border-radius:30px;color:#0E4C63}
footer{position:fixed;bottom:16px;font-size:0.8rem;color:#7a7468;width:100%}
a{color:#0E4C63}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #0E4C6355 0%, #0E4C6300 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div>
<div class="wrap">
<h1>Catchlog</h1>
<p>Track every fish you catch, from lake to lure.</p>
<div class="badge">Coming to the App Store</div>
</div>
<footer><a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a> &middot; s0533495227@gmail.com</footer>
</body></html>
